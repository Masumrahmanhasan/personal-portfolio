<svg width="800" height="500" viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#12161c"/>
      <stop offset="100%" stop-color="#1e242c"/>
    </linearGradient>
    <linearGradient id="highlightGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6cb4ff"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2b7fff"/>
      <stop offset="100%" stop-color="#00c6ff"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" rx="32" fill="url(#bgGrad)"/>
  <rect width="800" height="500" rx="32" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  
  <!-- Ambient glow -->
  <circle cx="650" cy="150" r="200" fill="rgba(0, 180, 255, 0.06)" filter="url(#glow)"/>

  <!-- ===== HEADER ===== -->
  <g transform="translate(40, 40)">
    <!-- Logo Icon -->
    <rect width="48" height="48" rx="14" fill="url(#logoGrad)"/>
    <text x="24" y="34" font-family="Arial, sans-serif" font-size="26" font-weight="600" fill="#fff" text-anchor="middle">✕</text>
    
    <!-- Logo Text -->
    <g transform="translate(60, 10)">
      <text x="0" y="18" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#ffffff">x<tspan fill="#6cb4ff">desk</tspan></text>
      <text x="0" y="34" font-family="Arial, sans-serif" font-size="12" font-weight="400" fill="rgba(255,255,255,0.35)" letter-spacing="2">.pro</text>
    </g>

    <!-- Badge -->
    <g transform="translate(640, 2)">
      <rect width="110" height="28" rx="14" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.06)"/>
      <circle cx="20" cy="14" r="4" fill="#4fc3ff"/>
      <text x="32" y="18" font-family="Arial, sans-serif" font-size="11" font-weight="500" fill="rgba(255,255,255,0.7)">live project</text>
    </g>
  </g>

  <!-- ===== BODY ===== -->
  <g transform="translate(40, 140)">
    <!-- Headline -->
    <text x="0" y="40" font-family="Arial, sans-serif" font-size="44" font-weight="700" fill="#f0f4ff">Workspace</text>
    <text x="0" y="85" font-family="Arial, sans-serif" font-size="44" font-weight="700" fill="url(#highlightGrad)">reimagined.</text>
    
    <!-- Subtext -->
    <text x="0" y="120" font-family="Arial, sans-serif" font-size="16" font-weight="400" fill="rgba(255,255,255,0.55)">
      <tspan fill="#4fc3ff">→</tspan> Smart desk ecosystem · productivity suite
    </text>

    <!-- Visual (Desk) -->
    <g transform="translate(540, 10)">
      <rect width="130" height="90" rx="24" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)"/>
      <rect x="40" y="15" width="50" height="30" rx="6" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="2"/>
      <rect x="47" y="55" width="36" height="8" rx="3" fill="rgba(255,255,255,0.08)"/>
      <circle cx="100" cy="30" r="6" fill="#4fc3ff" opacity="0.3" filter="url(#glow)"/>
    </g>
  </g>

  <!-- ===== FOOTER ===== -->
  <g transform="translate(40, 420)">
    <line x1="0" y1="0" x2="720" y2="0" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    
    <!-- Meta -->
    <text x="0" y="25" font-family="Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.25)">
      <tspan>📅 2026</tspan>
      <tspan dx="20">📁 UX · Dev</tspan>
      <tspan dx="20">💻 React · Three</tspan>
    </text>

    <!-- CTA -->
    <g transform="translate(600, 5)">
      <rect width="120" height="32" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.06)"/>
      <text x="20" y="21" font-family="Arial, sans-serif" font-size="12" font-weight="500" fill="rgba(255,255,255,0.6)">view case</text>
      <text x="95" y="21" font-family="Arial, sans-serif" font-size="12" fill="#4fc3ff">→</text>
    </g>
  </g>
</svg>