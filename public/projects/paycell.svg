<svg width="800" height="500" viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Fintech Brand Gradients -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B1424" />
      <stop offset="100%" stop-color="#1A2A40" />
    </linearGradient>
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00B4D8" />
      <stop offset="100%" stop-color="#0077B6" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F2C94C" />
      <stop offset="100%" stop-color="#F2994A" />
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#E2E8F0" />
    </linearGradient>
    
    <!-- Glow filters -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="30" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="cardShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="16" stdDeviation="24" flood-color="#000" flood-opacity="0.4" />
    </filter>
  </defs>

  <!-- Background Card -->
  <rect width="800" height="500" rx="32" fill="url(#bgGrad)" />
  <rect width="800" height="500" rx="32" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1.5" />

  <!-- Ambient glow (spotlight effect) -->
  <circle cx="650" cy="150" r="180" fill="url(#primaryGrad)" opacity="0.08" filter="url(#glow)" />
  <circle cx="120" cy="400" r="160" fill="url(#accentGrad)" opacity="0.04" filter="url(#glow)" />

  <!-- ===== HEADER: Logo + Badge ===== -->
  <g transform="translate(40, 40)">
    <!-- Logo Icon: Stylized 'P' + Wallet / Cell shape -->
    <rect width="48" height="48" rx="14" fill="url(#primaryGrad)" />
    <!-- 'P' inside the box -->
    <path d="M24 16 V32 M24 16 L30 16 Q36 16 36 22 Q36 28 30 28 L24 28" 
          stroke="#FFFFFF" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none" />
    <!-- small signal bars (cell concept) -->
    <rect x="33" y="12" width="3" height="4" rx="1" fill="rgba(255,255,255,0.6)" />
    <rect x="37" y="9" width="3" height="7" rx="1" fill="rgba(255,255,255,0.6)" />
    
    <!-- Logo Text: paycell -->
    <text x="65" y="28" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="700" fill="#F8FAFC">pay</text>
    <text x="113" y="28" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="700" fill="url(#primaryGrad)">cell</text>
    <text x="65" y="40" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="400" fill="rgba(255,255,255,0.3)" letter-spacing="1.5">.com</text>

    <!-- Live Badge -->
    <g transform="translate(630, 8)">
      <rect width="100" height="24" rx="12" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.08)" />
      <circle cx="16" cy="12" r="4" fill="#00B4D8" />
      <text x="26" y="17" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="500" fill="rgba(255,255,255,0.7)">active</text>
    </g>
  </g>

  <!-- ===== BODY: Headline + Visual (Payment Card) ===== -->
  <g transform="translate(40, 140)">
    <!-- Main Copy -->
    <text x="0" y="45" font-family="system-ui, -apple-system, sans-serif" font-size="44" font-weight="700" fill="#F8FAFC">Pay smarter.</text>
    <text x="0" y="95" font-family="system-ui, -apple-system, sans-serif" font-size="44" font-weight="700" fill="url(#primaryGrad)">Everywhere.</text>
    
    <!-- Subtitle -->
    <text x="0" y="130" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="400" fill="rgba(255,255,255,0.6)">
      <tspan fill="#00B4D8">✦</tspan> Digital wallet · Instant transfers · Zero fees
    </text>

    <!-- Right Visual: Credit Card Graphic -->
    <g transform="translate(460, 10)" filter="url(#cardShadow)">
      <!-- Card Body -->
      <rect width="220" height="110" rx="16" fill="url(#cardGrad)" />
      <rect width="220" height="110" rx="16" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1" />
      
      <!-- Card Chip -->
      <rect x="20" y="20" width="28" height="22" rx="4" fill="url(#accentGrad)" />
      <!-- Glow on chip -->
      <rect x="24" y="24" width="20" height="14" rx="2" fill="rgba(255,255,255,0.3)" />
      
      <!-- Contactless symbol -->
      <path d="M65 25 Q70 30 65 35 M72 25 Q78 32 72 39" stroke="rgba(0,0,0,0.15)" stroke-width="2" fill="none" stroke-linecap="round" />
      
      <!-- Card Number (masked) -->
      <text x="20" y="60" font-family="monospace, sans-serif" font-size="16" font-weight="500" fill="rgba(0,0,0,0.7)">•••• •••• •••• 4829</text>
      
      <!-- Expiry & Name -->
      <text x="20" y="80" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="600" fill="rgba(0,0,0,0.4)">VALID THRU</text>
      <text x="86" y="80" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="rgba(0,0,0,0.7)">12/26</text>
      <text x="20" y="95" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="rgba(0,0,0,0.7)">CARDHOLDER</text>
      
      <!-- Bank Logo (stylized swoosh) -->
      <path d="M150 20 Q165 35 150 55 Q135 70 150 90" stroke="url(#primaryGrad)" stroke-width="3" fill="none" stroke-linecap="round" />
    </g>

    <!-- Floating elements around the card (to simulate payment flow) -->
    <circle cx="430" cy="55" r="3" fill="#F2C94C" opacity="0.6" />
    <circle cx="660" cy="140" r="4" fill="#00B4D8" opacity="0.4" />
    <path d="M430 125 L440 135 L455 115" stroke="rgba(255,255,255,0.2)" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" />
  </g>

  <!-- ===== FOOTER: Meta + CTA ===== -->
  <g transform="translate(40, 430)">
    <!-- Divider -->
    <line x1="0" y1="0" x2="720" y2="0" stroke="rgba(255,255,255,0.06)" stroke-width="1" />

    <!-- Meta -->
    <text x="0" y="22" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="400" fill="rgba(255,255,255,0.3)">
      <tspan>📅 2026</tspan>
      <tspan dx="20">📱 Fintech · Wallet</tspan>
      <tspan dx="20">⚡ React · Node</tspan>
    </text>

    <!-- CTA Button -->
    <g transform="translate(600, 2)">
      <rect width="120" height="30" rx="15" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.08)" />
      <text x="18" y="20" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="500" fill="rgba(255,255,255,0.7)">try it now</text>
      <text x="95" y="20" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#00B4D8">→</text>
    </g>
  </g>
</svg>