<svg width="800" height="500" viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradients for the modern dashboard look -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A" />
      <stop offset="100%" stop-color="#1E293B" />
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6" />
      <stop offset="100%" stop-color="#06B6D4" />
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6" />
      <stop offset="100%" stop-color="#3B82F6" />
    </linearGradient>
    
    <!-- Glow filters for ambient light -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="25" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="12" stdDeviation="20" flood-color="#000" flood-opacity="0.5" />
    </filter>
  </defs>

  <!-- Card background with a subtle border -->
  <rect width="800" height="500" rx="32" fill="url(#bgGrad)" filter="url(#shadow)" />
  <rect width="800" height="500" rx="32" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1.5" />

  <!-- Ambient soft glows -->
  <circle cx="650" cy="120" r="220" fill="url(#purpleGrad)" opacity="0.08" filter="url(#glow)" />
  <circle cx="150" cy="380" r="200" fill="url(#blueGrad)" opacity="0.06" filter="url(#glow)" />

  <!-- ===== HEADER: Logo + Badge ===== -->
  <g transform="translate(40, 40)">
    <!-- Logo Icon: stylized 'K' with a KPI chart feel -->
    <rect width="48" height="48" rx="14" fill="url(#blueGrad)" />
    <text x="24" y="33" font-family="'Inter', -apple-system, sans-serif" font-size="26" font-weight="700" fill="#fff" text-anchor="middle">K</text>
    
    <!-- Logo Text: pro + kpi -->
    <text x="65" y="24" font-family="'Inter', -apple-system, sans-serif" font-size="28" font-weight="700" fill="#F8FAFC">pro</text>
    <text x="120" y="24" font-family="'Inter', -apple-system, sans-serif" font-size="28" font-weight="700" fill="#06B6D4">kpi</text>
    <text x="65" y="38" font-family="'Inter', -apple-system, sans-serif" font-size="10" font-weight="400" fill="rgba(255,255,255,0.35)" letter-spacing="1.5">.net</text>

    <!-- Live badge -->
    <g transform="translate(620, 6)">
      <rect width="110" height="26" rx="13" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.08)" />
      <circle cx="18" cy="13" r="4" fill="#06B6D4" />
      <text x="28" y="18" font-family="'Inter', -apple-system, sans-serif" font-size="11" font-weight="500" fill="rgba(255,255,255,0.7)">live dashboard</text>
    </g>
  </g>

  <!-- ===== BODY: Headline + Visual ===== -->
  <g transform="translate(40, 140)">
    <!-- Main title -->
    <text x="0" y="45" font-family="'Inter', -apple-system, sans-serif" font-size="44" font-weight="700" fill="#F8FAFC">Track everything.</text>
    <text x="0" y="95" font-family="'Inter', -apple-system, sans-serif" font-size="44" font-weight="700" fill="url(#blueGrad)">Achieve more.</text>

    <!-- Subtitle -->
    <text x="0" y="130" font-family="'Inter', -apple-system, sans-serif" font-size="16" font-weight="400" fill="rgba(255,255,255,0.55)">
      <tspan fill="#06B6D4">▸</tspan> Real-time KPI monitoring · actionable insights
    </text>

    <!-- Chart visual (right side) -->
    <g transform="translate(480, 10)">
      <!-- Chart card background -->
      <rect width="160" height="120" rx="20" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" />
      
      <!-- Bar chart (3 bars with different heights) -->
      <rect x="25" y="75" width="24" height="25" rx="4" fill="url(#blueGrad)" opacity="0.8" />
      <rect x="65" y="55" width="24" height="45" rx="4" fill="url(#blueGrad)" opacity="0.6" />
      <rect x="105" y="35" width="24" height="65" rx="4" fill="url(#blueGrad)" opacity="0.9" />
      
      <!-- Line chart overlay (sparkline) -->
      <polyline points="15,85 45,65 75,55 105,30 135,45" fill="none" stroke="#8B5CF6" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
      <circle cx="105" cy="30" r="5" fill="#8B5CF6" />
      <circle cx="45" cy="65" r="3" fill="#8B5CF6" />
      
      <!-- Subtle grid lines -->
      <line x1="15" y1="95" x2="145" y2="95" stroke="rgba(255,255,255,0.05)" stroke-width="1" stroke-dasharray="4,4" />
      <line x1="15" y1="55" x2="145" y2="55" stroke="rgba(255,255,255,0.05)" stroke-width="1" stroke-dasharray="4,4" />
    </g>
  </g>

  <!-- ===== FOOTER: Meta + CTA ===== -->
  <g transform="translate(40, 420)">
    <!-- Divider -->
    <line x1="0" y1="0" x2="720" y2="0" stroke="rgba(255,255,255,0.05)" stroke-width="1" />

    <!-- Meta information -->
    <text x="0" y="22" font-family="'Inter', -apple-system, sans-serif" font-size="12" fill="rgba(255,255,255,0.3)">
      <tspan>📅 2026</tspan>
      <tspan dx="20">📊 SaaS · Analytics</tspan>
      <tspan dx="20">⚛️ React · D3</tspan>
    </text>

    <!-- CTA button -->
    <g transform="translate(600, 5)">
      <rect width="120" height="30" rx="15" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.08)" />
      <text x="18" y="20" font-family="'Inter', -apple-system, sans-serif" font-size="12" font-weight="500" fill="rgba(255,255,255,0.6)">view dashboard</text>
      <text x="95" y="20" font-family="'Inter', -apple-system, sans-serif" font-size="12" fill="#06B6D4">→</text>
    </g>
  </g>
</svg>